<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>M&S CHAT</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #6a11cb, #2575fc);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h2 { text-shadow: 1px 1px 5px #000; }
    input { padding: 10px; border-radius: 5px; border: none; margin: 5px 0; width: 250px; }
    button { padding: 10px 20px; border: none; border-radius: 5px; background-color: #ff4081; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
    button:hover { background-color: #f50057; }
    ul { list-style: none; padding: 0; width: 100%; max-width: 500px; margin-top: 20px; }
    li { background: rgba(0,0,0,0.3); padding: 10px; margin: 5px 0; border-radius: 8px; word-wrap: break-word; }
    .disabled { opacity: 0.5; cursor: not-allowed; }
    #chatContainer { display: none; flex-direction: column; align-items: center; width: 100%; }
  </style>
</head>
<body>
  <h2>DRIVERS CHAT</h2>

  <!-- PIN input -->
  <input id="pinInput" placeholder="Enter PIN to access chat">
  <button id="pinBtn">Enter</button>

  <!-- Chat container (hidden initially) -->
  <div id="chatContainer">
    <input id="message" placeholder="Type your message here" disabled><br>
    <button id="sendBtn" class="disabled" disabled>Send</button>
    <ul id="messages"></ul>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC4RwUjxX9x118vXdlfr6UEZGC0rwL6-HE",
      authDomain: "chat-1cb54.firebaseapp.com",
      databaseURL: "https://chat-1cb54-default-rtdb.firebaseio.com/",
      projectId: "chat-1cb54",
      storageBucket: "chat-1cb54.firebasestorage.app",
      messagingSenderId: "353414353280",
      appId: "1:353414353280:web:e1c5c865ce0abfd9c0b165",
      measurementId: "G-1CNP83WJKZ"
    };

    const app = initializeApp(firebaseConfig);
    getAnalytics(app);
    const db = getDatabase(app);
    const messagesRef = ref(db, 'messages');

    const pinInput = document.getElementById("pinInput");
    const pinBtn = document.getElementById("pinBtn");
    const chatContainer = document.getElementById("chatContainer");
    const messageInput = document.getElementById("message");
    const sendBtn = document.getElementById("sendBtn");

    let currentAddress = null;
    const CORRECT_PIN = "21196";

    // PIN verification
    pinBtn.addEventListener('click', () => {
      if(pinInput.value === CORRECT_PIN){
        alert("PIN correct! Access granted.");
        pinInput.style.display = "none";
        pinBtn.style.display = "none";
        chatContainer.style.display = "flex";
        messageInput.disabled = false;
        if(currentAddress){
          sendBtn.disabled = false;
          sendBtn.classList.remove('disabled');
        }
      } else {
        alert("Incorrect PIN. Access denied.");
      }
    });

    // Geolocation
    if(navigator.geolocation){
      navigator.geolocation.watchPosition(position => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
          .then(res => res.json())
          .then(data => {
            currentAddress = data.display_name || null;
            if(currentAddress && messageInput.disabled === false){
              sendBtn.disabled = false;
              sendBtn.classList.remove('disabled');
            }
          })
          .catch(() => {
            currentAddress = null;
            sendBtn.disabled = true;
            sendBtn.classList.add('disabled');
          });
      }, () => {
        alert("Location permission is required to post messages.");
        sendBtn.disabled = true;
        sendBtn.classList.add('disabled');
      });
    }

    // Send message
    sendBtn.addEventListener('click', () => {
      const msg = messageInput.value.trim();
      if(!currentAddress){ alert("Location not ready"); return; }
      if(!msg){ alert("Cannot send empty message"); return; }

      push(messagesRef, {
        message: msg,
        location: currentAddress
      }).then(() => {
        messageInput.value = "";
      }).catch(err => {
        console.error("Error sending message:", err);
        alert("Failed to send message. Check console.");
      });
    });

    // Listen for messages
    onChildAdded(messagesRef, snapshot => {
      const data = snapshot.val();
      const li = document.createElement("li");
      let text = "";
      if(data.message) text += data.message + " | ";
      if(data.location) text += "📍 " + data.location;
      li.textContent = text;
      document.getElementById("messages").appendChild(li);
    });
  </script>
</body>
</html>
